name: Build KEA Images

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build base image
        run: |
          docker build \
            -t ghcr.io/lc19k/kea-base:latest \
            -f Dockerfile.base .
          docker push ghcr.io/lc19k/kea-base:latest

      - name: Build DHCP4 image
        run: |
          docker build \
            -t ghcr.io/lc19k/kea-dhcp4:latest \
            -f Dockerfile.dhcp4 .
          docker push ghcr.io/lc19k/kea-dhcp4:latest

      - name: Build DHCP6 image
        run: |
          docker build \
            -t ghcr.io/lc19k/kea-dhcp6:latest \
            -f Dockerfile.dhcp6 .
          docker push ghcr.io/lc19k/kea-dhcp6:latest

      - name: Build Control Agent image
        run: |
          docker build \
            -t ghcr.io/lc19k/kea-ctrl-agent:latest \
            -f Dockerfile.ctrl-agent .
          docker push ghcr.io/lc19k/kea-ctrl-agent:latest
